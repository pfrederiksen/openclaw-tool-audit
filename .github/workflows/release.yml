name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
      - name: Build distributions
        run: python -m build
      - name: Detect PyPI token
        id: pypi-token
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -n "$PYPI_API_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to PyPI with API token
        if: ${{ steps.pypi-token.outputs.present == 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
      - name: Publish to PyPI with Trusted Publishing
        if: ${{ steps.pypi-token.outputs.present == 'false' }}
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*

  homebrew:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Derive package version
        run: echo "PACKAGE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Resolve PyPI sdist URL
        id: pypi-sdist
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import urllib.request

          version = os.environ["PACKAGE_VERSION"]
          url = f"https://pypi.org/pypi/openclaw-tool-audit/{version}/json"
          with urllib.request.urlopen(url, timeout=30) as response:
              payload = json.load(response)

          for file_info in payload["urls"]:
              if file_info["packagetype"] == "sdist":
                  print(f"url={file_info['url']}")
                  break
          else:
              raise SystemExit(f"No sdist found for openclaw-tool-audit {version}")
          PY
      - name: Bump Homebrew formula
        uses: mislav/bump-homebrew-formula-action@v4
        with:
          formula-name: openclaw-tool-audit
          homebrew-tap: pfrederiksen/homebrew-tap
          download-url: ${{ steps.pypi-sdist.outputs.url }}
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
