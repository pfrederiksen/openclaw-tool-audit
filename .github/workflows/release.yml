name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
      - name: Build distributions
        run: python -m build
      - name: Detect PyPI token
        id: pypi-token
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -n "$PYPI_API_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to PyPI with API token
        if: ${{ steps.pypi-token.outputs.present == 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
      - name: Publish to PyPI with Trusted Publishing
        if: ${{ steps.pypi-token.outputs.present == 'false' }}
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*

  homebrew:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Derive package version
        run: echo "PACKAGE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Bump Homebrew formula
        uses: mislav/bump-homebrew-formula-action@v4
        with:
          formula-name: openclaw-tool-audit
          homebrew-tap: pfrederiksen/homebrew-tap
          download-url: https://files.pythonhosted.org/packages/source/o/openclaw-tool-audit/openclaw_tool_audit-${{ env.PACKAGE_VERSION }}.tar.gz
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
